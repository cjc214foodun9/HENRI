name: Project HENRI Continuous Integrity Pipeline

on:  
  push:  
    branches: [ main ]  
  pull_request:  
    branches: [ main ]

jobs:  
  audit_and_deploy:  
    runs-on: ubuntu-latest  
      
    steps:  
    - name: Checkout Active Source Code  
      uses: actions/checkout@v4

    - name: Setup Pipeline Authentication  
      run: |  
        mkdir -p ~/.ssh  
        echo "${{ secrets.VAST_AI_SSH_KEY }}" > ~/.ssh/id_rsa  
        chmod 600 ~/.ssh/id_rsa

    - name: Execute Remote Substrate Synchronization  
      run: |  
        # Rsync verified source code changes directly onto the remote server footprint  
        ssh -p 33683 -o StrictHostKeyChecking=no root@ssh2.vast.ai "mkdir -p /root/HENRI"
        rsync -avz --exclude '.git' --exclude '.github' -e "ssh -p 33683 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" ./ root@ssh2.vast.ai:/root/HENRI/

    - name: Trigger Unified Pipeline (Setup, Train, Benchmark, Upload)
      run: |  
        # Run the cohesive pipeline natively inside the remote container  
        ssh -p 33683 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@ssh2.vast.ai \
          "export DATABASE_URL=${{ secrets.DB_URL }} HF_TOKEN=${{ secrets.HF_READ_TOKEN }} HF_WRITE_TOKEN=${{ secrets.HF_WRITE_TOKEN }} && cd /root/HENRI && chmod +x ./HENRI_CORE_V1/setup_remote_server.sh && ./HENRI_CORE_V1/setup_remote_server.sh && chmod +x ./fix_and_run.sh && ./fix_and_run.sh"

    - name: Download Telemetry Metrics and Diagnostic Reports  
      if: always()  
      run: |  
        scp -P 33683 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@ssh2.vast.ai:/root/HENRI/system_integrity_report.json ./ || true
        scp -P 33683 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@ssh2.vast.ai:/root/HENRI/benchmark.log ./ || true

    - name: Archive System Integrity & Diagnostics Artifacts  
      if: always()  
      uses: actions/upload-artifact@v4  
      with:  
        name: henri-telemetry-ledger  
        path: |  
          ./system_integrity_report.json  
          ./benchmark.log  
